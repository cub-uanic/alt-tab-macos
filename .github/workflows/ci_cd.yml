on:
  push:
    branches:
      - master
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BUILD_DIR: ${{ github.workspace }}
  XCODE_BUILD_PATH: DerivedData/Build/Products/Release
  VERSION_FILE: VERSION.txt
  APP_NAME: AltTab
jobs:
  build:
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: 16
          cache: 'npm'
      - run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer
      - run: scripts/print_env.sh
      - run: npm ci
      - run: scripts/determine_next_version.sh
      - run: scripts/replace_environment_variables_in_app.sh
      - run: scripts/run_tests.sh
      - run: scripts/build_app.sh

      - name: Archive App
        run: |
          cd ${{ env.XCODE_BUILD_PATH }}
          zip -r "${{ env.APP_NAME }}.zip" "${{ env.APP_NAME }}.app"

      - uses: actions/upload-artifact@v4
        with:
          name: AltTab-Fork-Build
          path: ${{ env.XCODE_BUILD_PATH }}/*.zip
